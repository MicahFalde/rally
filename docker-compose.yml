services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: rally
      POSTGRES_PASSWORD: rally_dev
      POSTGRES_DB: rally
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rally"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://rally:rally_dev@db:5432/rally
      SECRET_KEY: dev-secret-key-change-in-production
      GEOCODIO_API_KEY: ${GEOCODIO_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
